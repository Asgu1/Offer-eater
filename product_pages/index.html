<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offer Eater | Game Detail</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="/src/js/game-detail.js"></script>
</head>

<body>
    <header id="main-header"></header>
    <main>
        <section class="game-detail">
            <h1 id="game-title"></h1>
            <img id="game-image" src="" alt="" />
            <p id="game-description"></p>
            <p id="game-genres"></p>
            <p id="game-rating"></p>
        </section>

        <section class="price-comparison">
            <h2>Price Comparison</h2>
            <label>
                Max Price: $<input type="number" id="max-price" placeholder="No limit" min="0" />
            </label>
            <ul id="deals-list"></ul>
        </section>
    </main>
    <footer id="main-footer"></footer>
</body>

</html>
