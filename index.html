<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./images/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offer Eater | Game Deal Finder</title>
  <link rel="stylesheet" href="./style/style.css" />
  <script type="module" src="./src/js/main.js"></script>
</head>

<body>
  <header id="main-header"></header>
  <main>
    <section class="hero">
      <h1>Find the Best Game Deals</h1>
      <p>Compare prices across multiple digital stores</p>
    </section>
    <section class="game-list">
      <h2 id="list-title">Top Deals</h2>
      <div class="filters">
        <select id="genre-filter">
          <option value="">All Genres</option>
          <option value="action">Action</option>
          <option value="rpg">RPG</option>
          <option value="shooter">Shooter</option>
          <option value="strategy">Strategy</option>
          <option value="adventure">Adventure</option>
          <option value="indie">Indie</option>
        </select>

        <select id="platform-filter">
          <option value="">All Platforms</option>
          <option value="4">PC</option>
          <option value="187">PlayStation 5</option>
          <option value="1">Xbox One</option>
          <option value="7">Nintendo Switch</option>
        </select>

        <label>
          Max Price: $<input type="number" id="price-filter" placeholder="No limit" min="0" />
        </label>

        <div class="search-container">
          <input type="text" id="search-game" placeholder="Search for a game..." />
          <button id="search-button">Search</button>
        </div>

        <button id="apply-filters">Apply Filters</button>
      </div>
      <ul class="games"></ul>
    </section>
  </main>
  <footer id="main-footer"></footer>
</body>

</html>
